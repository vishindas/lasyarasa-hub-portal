<div class="page-header">
  <div>
    <h2>Dance Styles</h2>
    <p class="page-subtitle">Configure the styles your school offers</p>
  </div>
  <button mat-flat-button color="primary" (click)="openForm()">
    <mat-icon>add</mat-icon> Add Style
  </button>
</div>

<mat-card>
  <table mat-table [dataSource]="styles()" class="full-width">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Style Name</th>
      <td mat-cell *matCellDef="let s"><strong>{{ s.name }}</strong></td>
    </ng-container>

    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>Description</th>
      <td mat-cell *matCellDef="let s" class="text-truncate">{{ s.description || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="sortOrder">
      <th mat-header-cell *matHeaderCellDef>Order</th>
      <td mat-cell *matCellDef="let s">{{ s.sortOrder }}</td>
    </ng-container>

    <ng-container matColumnDef="active">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let s">
        <span class="status-chip" [class]="s.active ? 'status-active' : 'status-inactive'">
          {{ s.active ? 'Active' : 'Inactive' }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let s">
        <button mat-icon-button (click)="openForm(s)" title="Edit"><mat-icon>edit</mat-icon></button>
        <button mat-icon-button color="warn" (click)="delete(s.id)" title="Remove"><mat-icon>delete</mat-icon></button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    @if (styles().length === 0) {
      <tr class="mat-row">
        <td [colSpan]="displayedColumns.length" class="empty-table">
          No dance styles yet. Add the styles your school teaches.
        </td>
      </tr>
    }
  </table>
</mat-card>
