<div class="sidebar">
  <div class="sidebar-brand">
    <span class="brand-icon">🪷</span>
    <span class="brand-name">LasyaRasa</span>
  </div>

  <nav>
    <mat-nav-list class="standalone-list">
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
    </mat-nav-list>

    @for (group of allGroups(); track group.label) {
      <div class="nav-group">
        <div class="nav-group-header" (click)="toggleGroup(group.label)">
          <mat-icon class="group-icon">{{ group.icon }}</mat-icon>
          <span class="group-label">{{ group.label }}</span>
          <mat-icon class="group-chevron" [class.open]="isExpanded(group.label)">
            expand_more
          </mat-icon>
        </div>

        @if (isExpanded(group.label)) {
          <mat-nav-list class="nav-group-items">
            @for (item of group.items; track item.route) {
              <a mat-list-item [routerLink]="item.route" routerLinkActive="active">
                <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
                <span matListItemTitle>{{ item.label }}</span>
              </a>
            }
          </mat-nav-list>
        }
      </div>
    }
  </nav>
</div>
